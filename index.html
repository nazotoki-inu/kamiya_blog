<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kamiya's Blog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <h1><a href="index.html">Kamiya's Blog</a></h1>
    <p class="subtitle">
      静岡県湖見市で暮らす会社員のブログ。<br>
      休日に撮った写真や日常の出来事を気ままに書いています。
    </p>
  </div>
</header>

<nav class="navbar">
  <a href="index.html">ホーム</a>
  <a href="photos.html">写真</a>
  <a href="profile.html">プロフィール</a>
</nav>

<div class="container">
  <main class="content">

    <section class="search-box">
      <input type="text" id="searchInput" placeholder="記事を検索">

      <select id="sortSelect">
        <option value="new">新しい順</option>
        <option value="old">古い順</option>
      </select>

      <label>
        <input type="checkbox" id="photoOnly">
        写真付きのみ
      </label>
    </section>

    <section id="postList"></section>

  </main>

  <aside class="sidebar">
    <div class="widget">
      <h3>プロフィール</h3>
      <p><strong>神谷</strong></p>
      <p>静岡県湖見市在住</p>
      <p>休日はカメラを持って景色を撮りに行くことが多いです。</p>
    </div>

    <div class="widget">
      <h3>最新記事</h3>
      <ul id="latestPosts"></ul>
    </div>

    <div class="widget">
      <h3>カテゴリー</h3>
      <ul id="categoryList"></ul>
    </div>

    <div class="widget">
      <h3>月別アーカイブ</h3>
      <ul id="archiveList"></ul>
    </div>

    <div class="widget">
      <h3>写真一覧</h3>
      <a href="photos.html">写真ギャラリーを見る</a>
    </div>
  </aside>
</div>

<footer>
  <p>© 2015 Kamiya's Blog</p>
</footer>

<script src="js/posts.js"></script>
<script src="js/main.js"></script>

</body>
</html>
