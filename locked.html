<body>
<header class="site-header">
  <div class="header-inner">
    <h1><a href="index.html">Kamiya's Blog</a></h1>
    <p class="subtitle">静岡県湖見市で暮らす会社員のブログ。<br>休日に撮った写真や日常の出来事を気ままに書いています。</p>

<div class="container">
  <main class="content">
    <article class="article-box">
      <h2 class="article-title">限定公開記事</h2>
      <p class="article-date">2015年9月17日（木） 01:32</p>

      <div id="lockBox" class="lock-box">
        <p>この記事はパスワードで保護されています。</p>
        <div class="lock-form">
          <label class="visually-hidden" for="passwordInput">パスワード</label>
          <input type="password" id="passwordInput" placeholder="パスワード" autocomplete="off" autocapitalize="none" spellcheck="false">
          <button id="unlockButton" type="button">送信</button>
        </div>
        <p id="errorMessage" class="error-message" aria-live="polite"></p>
      </div>

      <div id="secretContent" class="secret-content" hidden>
        <p>念のため、URLだけ残しておきます。</p>
        <p class="mystery-url"><a href="video.html">https://nazotoki-inu.github.io/kamiya_blog/video.html</a></p>
      </div>
      <noscript><p class="error-message">この記事を表示するにはJavaScriptを有効にしてください。</p></noscript>
    </article>
  </main>
